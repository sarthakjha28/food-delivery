name: My First Workflow

# Run workflow whenever code is pushed
on:
  push:

jobs:
  build:
    # Create temporary Ubuntu machine
    runs-on: ubuntu-latest

    steps:
      # Download repository into GitHub runner
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Install packages from package.json
      - name: Install Dependencies
        run: npm install

      # Verify React project builds successfully
      - name: Build React App
        run: npm run build

      # Build Docker image using Dockerfile
      - name: Build Docker Image
        run: docker build -t imsarthakjha/food-delivery:latest .

      # Login to Docker Hub using GitHub Secrets
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Push image to Docker Hub
      - name: Push Docker Image
        run: docker push imsarthakjha/food-delivery:latest